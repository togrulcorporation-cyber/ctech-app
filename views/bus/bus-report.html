<!-- ============================================================ -->
<!-- BUS REPORT VIEW - HTML -->
<!-- ============================================================ -->

<div id="busReportView" style="display:flex;flex-direction:column;">

  <div class="rpt-header">
    <button onclick="closeBusReport()" class="bs-home-btn" aria-label="Ana səhifəyə qayıt">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    </button>
    <div class="rpt-title">BUS <span>Real-Time</span> Report</div>
    <div class="rpt-header-btns">
      <button class="icon-btn" onclick="toggleTheme()" aria-label="Gecə rejimi" title="Gecə/Gündüz rejimi">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="rptThemeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="rpt-btn rpt-btn-refresh" onclick="loadReportData()" aria-label="Yenilə" title="Yenilə">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        <span>Yenilə</span>
      </button>
      <button class="rpt-btn rpt-btn-export" id="rptExcelBtn" onclick="exportToExcel()" aria-label="Excel yüklə" title="Excel yüklə" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Excel</span>
      </button>
    </div>
  </div>

  <div class="rpt-toolbar">
    <div class="rpt-search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" class="rpt-search" id="rptGlobalSearch" placeholder="Ticket ID, Tarix, D.Q.N., BUS ID və ya Daşıyıcı üzrə axtar..." oninput="applyFilters()">
    </div>
    <div class="rpt-date-box">
      <div class="status-dot"></div>
      <span id="rptDateBox">--.--.----</span>
      <span class="rpt-date-sep">|</span>
      <span id="rptClockBox">--:--:--</span>
    </div>
    <span class="rpt-info" id="rptCount">— nəticə</span>
  </div>

  <div class="rpt-body-scroll">
    <div class="rpt-table-wrap">
      <table class="rpt-table">
        <colgroup>
          <col class="col-id"><col class="col-date"><col class="col-plate"><col class="col-bus"><col class="col-carrier"><col class="col-act">
        </colgroup>
        <thead>
          <tr>
            <th>Ticket ID</th>
            <th>Tarix</th>
            <th>D.Q.N.</th>
            <th>BUS ID</th>
            <th class="col-carrier">Daşıyıcı</th>
            <th class="col-act"></th>
          </tr>
        </thead>
        <tbody id="rptTableBody">
          <tr><td colspan="6"><div class="rpt-loading"><div class="spinner" style="width:36px;height:36px;border-width:4px;"></div><span>Məlumatlar yüklənir...</span></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="rpt-loadmore-wrap" id="rptLoadMoreWrap" style="display:none;">
      <button class="rpt-loadmore-btn" onclick="rptShowMore()" id="rptLoadMoreBtn">Daha çox göstər</button>
    </div>
  </div>
</div>
