<!-- ============================================================ -->
<!-- BUS BULK VIEW - HTML -->
<!-- ============================================================ -->

<div id="busBulkView" style="display:flex;flex-direction:column;">

  <div class="bk-header">
    <div class="bk-header-left">
      <button onclick="closeBusBulk()" style="background:none;border:none;cursor:pointer;color:#12233B;padding:4px;display:flex;align-items:center;justify-content:center;" aria-label="Geri">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      </button>
      <div class="bk-title">Toplu <span>İdxal</span></div>
    </div>
    <div class="bk-header-right">
      <button class="bk-btn bk-btn-ghost" onclick="resetBulkForm()">Sıfırla</button>
      <button class="icon-btn" onclick="toggleTheme()" aria-label="Tema">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="bkThemeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div class="bk-body">
    <div class="bk-grid" id="bkGrid">
      <!-- Sol panel: Tarix, Saat, Kateqoriya, Ünvan -->
      <div class="bk-col-left">
        <div class="bk-panel">
          <div class="bk-panel-title">
            <span class="bk-num">1</span> Servis parametrləri
          </div>
          <div class="bk-field">
            <label class="bk-label">Servis tarixi *</label>
            <div style="background:#F8FAFD;border:1.5px solid #DCE6F5;border-radius:10px;padding:11px 14px;font-size:14px;color:#12233B;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;" onclick="document.getElementById('bk_date_picker').showPicker ? document.getElementById('bk_date_picker').showPicker() : null;">
              <span id="bkDateDisplay"></span>
              <input type="date" id="bk_date_picker" style="display:none;" onchange="bkDateChanged(this.value)">
            </div>
          </div>
          <div class="bk-row2">
            <div class="bk-field">
              <label class="bk-label">Başlanğıc *</label>
              <div class="bk-time-input">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
                <input type="text" inputmode="numeric" maxlength="5" id="bk_start_time" placeholder="--:--" oninput="bkFormatTime(this)">
              </div>
            </div>
            <div class="bk-field">
              <label class="bk-label">Bitiş *</label>
              <div class="bk-time-input">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
                <input type="text" inputmode="numeric" maxlength="5" id="bk_end_time" placeholder="--:--" oninput="bkFormatTime(this)">
              </div>
            </div>
          </div>
          <div class="bk-field">
            <label class="bk-label">Servis kateqoriyası *</label>
            <select class="bk-select" id="bk_category"><option value="">Seçin</option></select>
          </div>
          <div class="bk-field">
            <label class="bk-label">Servis verilən ünvan</label>
            <select class="bk-select" id="bk_location"><option value="">Seçin (könüllü)</option></select>
          </div>
          <div class="bk-field" id="bk_location_note_wrap" style="display:none;">
            <label class="bk-label">Ünvan qeydi *</label>
            <textarea class="bk-textarea" id="bk_location_note" placeholder="Ünvanı ətraflı yazın..."></textarea>
          </div>
        </div>
      </div>

      <!-- Orta panel: Daşıyıcı, Şablonlar -->
      <div class="bk-col-mid">
        <div class="bk-panel">
          <div class="bk-panel-title">
            <span class="bk-num">2</span> Daşıyıcı &amp; şablonlar
          </div>
          <div class="bk-field">
            <label class="bk-label">Daşıyıcı firma *</label>
            <select class="bk-select" id="bk_carrier" onchange="bkOnCarrierChange()"><option value="">Seçin</option></select>
            <div id="bkCarrierCountWrap" style="margin-top:12px;"></div>
          </div>
          <div class="bk-field">
            <label class="bk-label">Tələb / Problem şablonu *</label>
            <textarea class="bk-textarea" id="bk_request_tmpl" placeholder="Məs. Validator ödəniş kartını qəbul etmir" style="min-height:60px;"></textarea>
          </div>
          <div class="bk-field">
            <label class="bk-label">Həll / Açıqlama şablonu *</label>
            <textarea class="bk-textarea" id="bk_solution_tmpl" placeholder="Məs. Validator dəyişdirildi" style="min-height:60px;"></textarea>
          </div>
          <div class="bk-field">
            <label class="bk-label">Qeyd (könüllü)</label>
            <textarea class="bk-textarea" id="bk_note" placeholder="Əlavə qeyd..." style="min-height:50px;"></textarea>
          </div>
        </div>

        <div class="bk-panel" style="border-color:#E1EAF6;border-width:1px;">
          <div class="bk-panel-title">
            <span class="bk-num">3</span> Texnik heyət
          </div>
          <div class="bk-field">
            <label class="bk-label">1. Texnik *</label>
            <select class="bk-select" id="bk_tech1"><option value="">Seçin</option></select>
          </div>
          <div class="bk-field">
            <label class="bk-label">2. Texnik (könüllü)</label>
            <select class="bk-select" id="bk_tech2"><option value="">Seçin</option></select>
          </div>
          <div class="bk-field">
            <label class="bk-label">Qrup rəhbəri *</label>
            <select class="bk-select" id="bk_leader"><option value="">Seçin</option></select>
          </div>
        </div>
      </div>

      <!-- Sağ panel: Ön baxış -->
      <div class="bk-col-right">
        <div id="bkPreviewPanel" class="bk-preview-panel">
          <div class="bk-preview-head">
            <div class="bk-preview-title">Ön baxış</div>
            <button class="bk-preview-close" onclick="bkClosePreview()" aria-label="Bağla">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
          </div>
          <div class="bk-empty-state">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>
            <div>Parametrləri doldurub "Ön baxış"a basın</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bk-footer">
    <div class="bk-footer-hint">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Daşıyıcı seçilərkən reyestrdən avtobuslar avtomatik tapılır
    </div>
    <button class="bk-btn-outline" onclick="bkOpenPreview()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      Ön baxış
    </button>
    <button class="bk-btn-primary" id="bkDirectSubmitBtn" onclick="bkSubmitDirect()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Birbaşa idxal
    </button>
  </div>
</div>
